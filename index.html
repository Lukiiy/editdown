<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="preview.css">
    <title>📄 Editdown</title>
    <meta name="description" content="A weird Markdown editor!">
    <link rel="author" href="Lukiiy">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <menu>
            <button onclick="wrap('**','**')" title="Bold"><b>B</b></button>
            <button onclick="wrap('*','*')" title="Italic"><i>I</i></button>
            <button onclick="wrap('~~','~~')" title="Strikethrough"><s>S</s></button>
            <button onclick="wrap('`','`')" title="Inline code">` `</button>

            <div class="sep"></div>

            <button onclick="line('# ')" title="Heading 1">H1</button>
            <button onclick="line('## ')" title="Heading 2">H2</button>
            <button onclick="line('### ')" title="Heading 3">H3</button>

            <div class="sep"></div>

            <button onclick="line('> ')">Quote</button>
            <button onclick="line('- ')" title="Unordered List">• List</button>
            <button onclick="line('1. ')" title="Ordered List">1. List</button>
            <button onclick="line('- [ ] ')" title="Task">☐ Task</button>

            <div class="sep"></div>

            <button onclick="insertLink()">Link</button>
            <button onclick="insertImg()">Image</button>
            <button onclick="wrap('\n```\n','\n```\n')">Code</button>
            <button onclick="line('---\n')"><b>—</b></button>
            <button onclick="insertTable()">Table</button>
        </menu>

        <section>
            <button onclick="importFile()" title="Import">📂</button>
            <button onclick="exportFile()" title="Export / Download">📥</button>
            <button onclick="theme()" title="Theme">🌙</button>
        </section>

        <input id="fileImport" type="file" accept=".md,text/plain" hidden aria-hidden="">

        <p class="wordcount" id="wc">0 words</p>
    </nav>

    <section>
        <button id="btnEdit" class="active" onclick="setMode('edit')">Edit</button>
        <button id="btnPreview" onclick="setMode('preview')">Preview</button>
    </section>

    <textarea id="editor" placeholder="Markdown goes here!" spellcheck="false"></textarea>
    <div><div id="preview"></div></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/16.3.0/lib/marked.umd.min.js"></script>
    <script src="app.js" defer></script>
</body>
</html>
